<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dot-ui</title>
</head>

<body>
  <div id="button">
    <!-- solid -->
    <dot-button>Save</dot-button>

    <!-- outline -->
    <dot-button variant="outline">Cancel</dot-button>

    <!-- ghost -->
    <dot-button variant="ghost">See more</dot-button>

    <!-- danger -->
    <dot-button variant="danger">Delete</dot-button>

    <!-- sizes -->
    <dot-button size="sm">Small</dot-button>
    <dot-button size="lg">Large</dot-button>

    <!-- estados -->
    <dot-button disabled>Disabled</dot-button>
    <dot-button loading>Loading</dot-button>

    <!-- block -->
    <dot-button block>Full width</dot-button>
  </div>
  <script type="module" src="/src/index.ts"></script>
</body>

</html>
