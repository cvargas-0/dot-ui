{% extends "layout.html" %}

{% block title %}{{ page.title }} — {{ config.title }}{% endblock %}

{% block content %}
<article>
  <header class="component-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p>{{ page.description }}</p>
    {% endif %}
  </header>
  {{ page.content | safe }}
</article>
{% endblock %}
