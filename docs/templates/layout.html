<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.extra.description }}{% endblock %}">
  <link rel="canonical" href="{{ config.extra.web }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ config.title }}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.extra.description }}{% endblock %}">
  <meta property="og:url" content="{{ config.extra.web }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}{{ config.title }}{% endblock %}">
  <meta name="twitter:description"
    content="{% block twitter_description %}{{ config.extra.description }}{% endblock %}">

  <link rel="icon" type="image/x-icon" href="/imgs/favicon.ico">

  <link rel="stylesheet" href="/styles/fonts.css">

  <link rel="stylesheet" href="/styles/dot-ui.min.css">
  <script src="/js/dot-ui.min.js" defer></script>

  <link rel="stylesheet" href="/styles/index.css">
  <script src="/js/theme.js"></script>
</head>

<body>
  <div data-sidebar-provider>

    <aside data-sidebar>
      <div data-sidebar-header>
        <div class="docs-logo">
          <a href="/">
            <span class="docs-logo-dot">dot</span><span class="docs-logo-sep">·</span><span
              class="docs-logo-ui">ui</span>
          </a>
          <span class="docs-version">v{{ config.extra.version }}</span>
        </div>
      </div>

      <div data-sidebar-content>
        <div data-sidebar-group>
          <p data-sidebar-group-label>Getting Started</p>
          <ul data-sidebar-menu>
            <li data-sidebar-menu-item>
              <a href="/" data-sidebar-menu-button {% if current_path=="/" %}aria-current="page" {% endif
                %}>Introduction</a>
            </li>
            <li data-sidebar-menu-item>
              <a href="/usage/" data-sidebar-menu-button {% if current_path=="/usage/" %}aria-current="page" {% endif
                %}>Usage</a>
            </li>
          </ul>
        </div>
        <div data-sidebar-group>
          <p data-sidebar-group-label>Foundations</p>
          <ul data-sidebar-menu>
            <li data-sidebar-menu-item>
              <a href="/typography/" data-sidebar-menu-button {% if current_path=="/typography/" %}aria-current="page"
                {% endif %}>Typography</a>
            </li>
            <li data-sidebar-menu-item>
              <a href="/utilities/" data-sidebar-menu-button {% if current_path=="/utilities/" %}aria-current="page" {%
                endif %}>Utilities</a>
            </li>
          </ul>
        </div>
        <div data-sidebar-group>
          <p data-sidebar-group-label>Components</p>
          <ul data-sidebar-menu>
            <li data-sidebar-menu-item><a href="/components/button/" data-sidebar-menu-button {% if
                current_path=="/components/button/" %}aria-current="page" {% endif %}>Button</a></li>
            <li data-sidebar-menu-item><a href="/components/badge/" data-sidebar-menu-button {% if
                current_path=="/components/badge/" %}aria-current="page" {% endif %}>Badge</a></li>
            <li data-sidebar-menu-item><a href="/components/alert/" data-sidebar-menu-button {% if
                current_path=="/components/alert/" %}aria-current="page" {% endif %}>Alert</a></li>
            <li data-sidebar-menu-item><a href="/components/card/" data-sidebar-menu-button {% if
                current_path=="/components/card/" %}aria-current="page" {% endif %}>Card</a></li>
            <li data-sidebar-menu-item><a href="/components/form/" data-sidebar-menu-button {% if
                current_path=="/components/form/" %}aria-current="page" {% endif %}>Form</a></li>
            <li data-sidebar-menu-item><a href="/components/tabs/" data-sidebar-menu-button {% if
                current_path=="/components/tabs/" %}aria-current="page" {% endif %}>Tabs</a></li>
            <li data-sidebar-menu-item><a href="/components/dropdown/" data-sidebar-menu-button {% if
                current_path=="/components/dropdown/" %}aria-current="page" {% endif %}>Dropdown</a></li>
            <li data-sidebar-menu-item><a href="/components/toast/" data-sidebar-menu-button {% if
                current_path=="/components/toast/" %}aria-current="page" {% endif %}>Toast</a></li>
          </ul>
        </div>
      </div>

      <div data-sidebar-footer>
        <button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          Toggle theme
        </button>
        <a href="https://github.com/cvargas-0/dot-ui" class="docs-github-link" target="_blank"
          rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
          </svg>
          GitHub
        </a>
      </div>

    </aside>

    <div data-sidebar-inset>
      <nav data-topnav>
        <div class="topnav-left">
          <button data-sidebar-trigger aria-label="Toggle sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <a href="/" class="docs-logo-topnav">dot<span>·ui</span></a>
        </div>
        <div class="topnav-right">
          <span class="docs-version-badge">v{{ config.extra.version }}</span>
          <a href="https://github.com/cvargas-0/dot-ui" class="topnav-github" target="_blank" rel="noopener noreferrer"
            aria-label="GitHub repository">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
            </svg>
          </a>
        </div>
      </nav>

      <main class="container">
        {% block content %}{% endblock %}
      </main>
    </div>

  </div>
</body>

</html>
